<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM Data Dashboard</title>
    <link rel="stylesheet" href="starter-styles.css" />
  </head>
  <body>
    <main class="dashboard">
      <header class="dashboard-header">
        <h1>DOM Data Dashboard</h1>
        <p>Filter and sort student activity data.</p>
      </header>

      <section class="controls" aria-label="Dashboard controls">
        <label>
          Category
          <select id="categoryFilter">
            <option value="all">All</option>
            <option value="coding">Coding</option>
            <option value="math">Math</option>
            <option value="reading">Reading</option>
          </select>
        </label>

        <label>
          Sort
          <select id="sortSelect">
            <option value="score-desc">Score (high to low)</option>
            <option value="score-asc">Score (low to high)</option>
            <option value="minutes-asc">Minutes (low to high)</option>
            <option value="minutes-desc">Minutes (high to low)</option>
          </select>
        </label>

        <label>
          Search Title
          <input id="searchInput" type="text" placeholder="Type to search..." />
        </label>
      </section>

      <section id="statsPanel" class="stats" aria-live="polite"></section>

      <p id="statusMessage" class="status" aria-live="polite"></p>

      <section id="cardGrid" class="card-grid" aria-label="Activity cards"></section>
    </main>

    <script src="starter-script.js"></script>
  </body>
</html>
